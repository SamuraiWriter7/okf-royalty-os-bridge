- source_field: "title"
  target_fields:
    - "okf_document.title"
  mapping_role: "Provides the human-readable title of the referenced knowledge package."
  is_required_for_okf: false
  is_required_for_bridge: true
  notes: "The title supports review, indexing, and human inspection."

- source_field: "description"
  target_fields:
    - "okf_document.description"
  mapping_role: "Provides a summary of the knowledge package."
  is_required_for_okf: false
  is_required_for_bridge: false
  notes: "The description helps agents and reviewers understand the scope of the knowledge package."

- source_field: "resource"
  target_fields:
    - "okf_document.resource"
    - "evidence.ref"
    - "origin.origin_uri"
  mapping_role: "Connects the OKF document to an external source, reference, or authoritative location."
  is_required_for_okf: false
  is_required_for_bridge: false
  notes: "Resource is treated as an evidence candidate, not as complete proof of origin."

- source_field: "tags"
  target_fields:
    - "okf_document.tags"
    - "allocation.policy_tags"
  mapping_role: "Provides topic and policy classification hints."
  is_required_for_okf: false
  is_required_for_bridge: false
  notes: "Tags may support routing and policy classification, but do not determine ownership or allocation by themselves."

- source_field: "timestamp"
  target_fields:
    - "okf_document.timestamp"
    - "lifecycle.review_note"
  mapping_role: "Provides temporal context for creation, update, or review."
  is_required_for_okf: false
  is_required_for_bridge: false
  notes: "Timestamp should not be treated as a complete lifecycle record without review."
